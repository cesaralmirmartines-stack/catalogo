 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Abarrotes - Catálogo Digital</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg-color: #fafafa; --card-bg: #f5f5f5; --primary-orange: #c84b31;
            --text-dark: #333; --text-light: #888; --pill-green-bg: #e6f7ef; --pill-green-text: #2d8a5c;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; color: var(--text-dark); }
        .app-container { max-width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .logo-icon { background-color: var(--primary-orange); color: white; padding: 10px; border-radius: 12px; margin-right: 15px; font-size: 24px; width: 30px; height: 30px; text-align: center; line-height: 30px; }
        .header-text h1 { margin: 0; font-size: 20px; font-weight: bold; }
        .header-text p { margin: 0; font-size: 11px; color: var(--text-light); letter-spacing: 1px; text-transform: uppercase; }

        .search-bar { width: 100%; padding: 14px 15px; border-radius: 20px; border: 1px solid #eee; background-color: #fcfcfc; margin-bottom: 20px; outline: none; box-sizing: border-box; font-size: 16px; }
        .categories { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .categories::-webkit-scrollbar { display: none; }
        .pill { padding: 8px 18px; border-radius: 20px; border: 1px solid #eee; font-size: 14px; background-color: white; cursor: pointer; white-space: nowrap; }
        .pill.active { background-color: #1a1a1a; color: white; border-color: #1a1a1a; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-card { background-color: var(--card-bg); border-radius: 16px; padding: 12px; position: relative; display: flex; flex-direction: column; justify-content: space-between; }
        .category-tag { background-color: white; font-size: 9px; padding: 4px 8px; border-radius: 10px; font-weight: bold; position: absolute; top: 12px; left: 12px; text-transform: uppercase; }
        .product-image-container { width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; margin: 15px 0 8px 0; border-radius: 8px; overflow: hidden; }
        .product-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-info { background-color: white; padding: 12px; border-radius: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-title { margin: 0 0 8px 0; font-size: 15px; font-weight: 500; }
        .price-container { font-size: 20px; font-weight: bold; color: var(--primary-orange); margin-bottom: 6px; }
        .price-unit { font-size: 10px; color: var(--text-light); font-weight: normal; }
        .wholesale { display: inline-block; background-color: var(--pill-green-bg); color: var(--pill-green-text); padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        
        footer { text-align: center; margin-top: 40px; font-size: 11px; color: #ccc; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="logo-icon">🏪</div>
            <div class="header-text">
                <h1>Mi Abarrotes</h1>
                <p>Catálogo Digital</p>
            </div>
        </div>

        <input type="text" class="search-bar" id="buscador" placeholder="Buscar producto..." onkeyup="dibujar()">

        <div class="categories">
            <div class="pill active" onclick="filtrar('Todo', this)">Todo</div>
            <div class="pill" onclick="filtrar('Abarrotes', this)">Abarrotes</div>
            <div class="pill" onclick="filtrar('Bebidas', this)">Bebidas</div>
            <div class="pill" onclick="filtrar('Dulces', this)">Dulces</div>
        </div>

        <div class="products-grid" id="lista-productos"></div>

        <footer>Mi Abarrotes — Catálogo Digital</footer>
    </div>

    <script>
        // Configuración enlazada a tu proyecto tienda-angel
        const firebaseConfig = {
            apiKey: "AIzaSyDrzWm0QZD10_3eGyIG",
            authDomain: "tienda-angel.firebaseapp.com",
            databaseURL: "https://tienda-angel-default-rtdb.firebaseio.com",
            projectId: "tienda-angel",
            storageBucket: "tienda-angel.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let productos = [];
        let catActual = 'Todo';

        db.ref('productos').on('value', (snapshot) => {
            const data = snapshot.val();
            productos = [];
            if(data) {
                Object.keys(data).forEach(id => { productos.push({ id, ...data[id] }); });
            }
            dibujar();
        });

        function dibujar() {
            const grid = document.getElementById('lista-productos');
            grid.innerHTML = '';
            const query = document.getElementById('buscador').value.toLowerCase();

            productos.forEach(p => {
                if((catActual === 'Todo' || p.categoria === catActual) && p.nombre.toLowerCase().includes(query)) {
                    grid.innerHTML += `
                        <div class="product-card">
                            <span class="category-tag">${p.categoria}</span>
                            <div class="product-image-container">
                                <img src="${p.imagen || 'https://via.placeholder.com/100?text=📦'}" alt="Producto">
                            </div>
                            <div class="product-info">
                                <h3 class="product-title">${p.nombre}</h3>
                                <div>
                                    <div class="price-container">$${parseFloat(p.precioPieza).toFixed(2)} <span class="price-unit">/ pza</span></div>
                                    <div class="wholesale">Mayoreo $${parseFloat(p.precioMayoreo).toFixed(2)}</div>
                                </div>
                            </div>
                        </div>`;
                }
            });
        }

        function filtrar(cat, boton) {
            catActual = cat;
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            boton.classList.add('active');
            dibujar();
        }
    </script>
</body>
</html>
